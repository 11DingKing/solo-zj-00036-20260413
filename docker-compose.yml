services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: amigoscodedemo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      retries: 5

  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:postgresql://postgres:5432/amigoscodedemo
      - DB_USERNAME=postgres
      - DB_PASSWORD=password
    depends_on:
      postgres:
        condition: service_healthy
